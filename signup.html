<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Your Account — CandyWorld</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <style>
    .signup-box { max-width: 450px; margin: 160px auto; padding: 40px; background: var(--card-bg); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1); }
    .signup-box h2 { margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: var(--muted); }
    .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; }
    .btn-submit { width: 100%; padding: 14px; border-radius: 8px; background: var(--purple); color: #fff; border: none; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">🍬 CandyWorld</a>
  </div>
</nav>

<div class="signup-box">
  <h2>Join CandyWorld</h2>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" placeholder="you@example.com"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="••••••••"/>
  </div>
  <button class="btn-submit" onclick="alert('Account creation is temporarily disabled. Please try again later.')">Create Account</button>
  <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:var(--muted)">Already have an account? <a href="#" style="color:var(--purple)">Log in</a></p>
</div>

<script src="assets/s.js"></script>
</body>
</html>
